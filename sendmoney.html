<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Enviar dinero</title>
</head>

<body>
  <div class="container">
    <h1 class="mt-4">Enviar dinero</h1>

    <div id="alert-container"></div>

    <div class="card p-4 mt-3">
      <h3>Saldo actual: $<span id="saldoEnvio">0</span></h3>

      <button id="btnMostrarContacto" class="btn btn-primary mt-3">
        Agregar nuevo contacto
      </button>

      <div id="formContacto" class="mt-3" style="display: none;">
        <input type="text" id="nombreContacto" class="form-control mb-2" placeholder="Nombre y apellido">
        <input type="text" id="cbuContacto" class="form-control mb-2" placeholder="Número de CBU">
        <input type="text" id="aliasContacto" class="form-control mb-2" placeholder="Alias">
        <input type="text" id="bancoContacto" class="form-control mb-2" placeholder="Nombre del banco">

        <button id="btnGuardarContacto" class="btn btn-success">
          Guardar contacto
        </button>

        <button id="btnCancelarContacto" class="btn btn-secondary">
          Cancelar
        </button>
      </div>

      <hr>

      <h4>Contactos</h4>
      <input type="text" id="buscarContacto" class="form-control mb-3" placeholder="Buscar por nombre o alias">

      <select id="listaContactos" class="form-control">
        <option value="">Seleccione un contacto</option>
      </select>

      <input type="number" id="montoEnviar" class="form-control mt-3" placeholder="Monto a enviar">

      <button id="btnEnviarMonto" class="btn btn-success mt-3" style="display: none;">
        Enviar dinero
      </button>

      <p id="mensajeEnvio" class="mt-3"></p>

      <a href="menu.html" class="btn btn-secondary mt-3">
        Volver al menú
      </a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
