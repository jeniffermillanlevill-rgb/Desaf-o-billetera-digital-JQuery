<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Depósito</title>
</head>

<body>
  <div class="container">
    <h1 class="mt-4">Realizar depósito</h1>

    <div id="alert-container"></div>

    <div class="card p-4 mt-3">
      <h3>Saldo actual: $<span id="saldoActual">0</span></h3>

      <div class="form-group mt-3">
        <label for="montoDeposito">Monto a depositar:</label>
        <input type="number" id="montoDeposito" class="form-control">
      </div>

      <button id="btnRealizarDeposito" class="btn btn-primary">
        Realizar depósito
      </button>

      <p id="mensajeDeposito" class="mt-3"></p>

      <a href="menu.html" class="btn btn-secondary mt-3">
        Volver al menú
      </a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
